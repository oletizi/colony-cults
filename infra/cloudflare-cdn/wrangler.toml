name = "colony-cults-cdn"
main = "worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

# Read-only edge cache in front of the PUBLIC colony-cults B2 bucket (TASK-12).
# B2_DOWNLOAD_BASE is the B2 friendly download URL for the bucket. The host
# (f004) is the us-west-004 region download host; confirm it from
# `b2 account get` / `b2_authorize_account`'s downloadUrl and adjust if needed.
[vars]
B2_DOWNLOAD_BASE = "https://f004.backblazeb2.com/file/colony-cults"
EDGE_TTL_SECONDS = "2592000"
