- id: SRCH-0015
  date: 2026-07-17
  repository: Internet Archive (archive.org)
  scope:
    kind: case
    id: port-breton
  query: "Verify-or-reject the four discrete IA newspaper-issue candidates SRCH-0014 surfaced on the affair/New-Ireland handles: do the full-issue OCR scans of China Mail 1880-10-16 (NPCM18801016), China Mail 1882-03-08 (NPCM18820308), Hong Kong Daily Press 1883-07-16 (NPDP18830716) and Hong Kong Telegraph 1894-01-02 (NPTG18940102) actually contain genuine Marquis de Rays / Port-Breton coverage, or was the search hit incidental? Examined each item's OCR full text (the _djvu.txt) for guarded affair terms in context."
  coverage: "MEASURED -- 3 of 4 CONFIRMED as genuine contemporary Asian-English-press coverage of the affair; 1 REJECTED as an incidental hit. (1) CONFIRMED China Mail 1880-10-16 (NPCM18801016): a shipboard eyewitness report relayed via the steamer Glenroy from the 'Sea Islands' -- 'the quixotic undertaking of the Marquis de Rays, a Legitimist, who thought of forming a New France' in the New Britain / New Ireland archipelago; colonists dead, survivors 'lived in huts more miserable and filthy than those of the lowest natives', flour and bread casks scattered on the beach. Among the earliest disaster coverage (Oct 1880). (2) CONFIRMED China Mail 1882-03-08 (NPCM18820308): a column headed 'THE COLONY OF PORT BRETON' quoting El Comercio -- Port Breton 'must be an unenviable spot', 'the poor emigrants were anxious to get clear of it'. (3) CONFIRMED Hong Kong Daily Press 1883-07-16 (NPDP18830716): 'TRIAL OF THE MARQUIS DE RAYS' -- the Marquis and seventeen others tried for manslaughter and infringement of the emigration laws; the 1877 land-sale scheme on 'Port Breton, Oceania', 5,000,000 francs subscribed, the Marquis 'pocketed 2,000,000', 700,000 hectares sold -- a press complement to the French legal record (PB-P004/P054). (4) REJECTED Hong Kong Telegraph 1894-01-02 (NPTG18940102): the OCR carries only a bare 'expedition' and NO de Rays / Port-Breton / New Ireland / Nouvelle France term -- the SRCH-0014 hit was incidental, and 1894 sits outside the affair window. Trimmed affair-coverage excerpts persisted as evidence under bibliography/repository-responses/PB-P055 (ia-press-verify-*-2026-07-17.txt); full issue OCR remains at the source."
  remainingQuestions:
    - "ACQUIRE the 3 confirmed press issues? They are discrete IA full-text public-domain items (pre-1955 colonial English-language papers), acquirable via the shipped spec-013 IA adapter -- a genuine THIRD contemporary-press thread (Asian-English) distinct from the Australian slice (PB-P005, Trove) and the French legal/press record (PB-P004). Weigh: each is a whole newspaper issue acquired for one affair article (heavier than a single-article anchor). Captured as a follow-up (TASK-37)."
    - "The rejected NPTG18940102 (HK Telegraph 1894) is dropped from the press-candidate set; recorded here so the boundary is legible rather than silently discarded."
  notes: "Answers, in the affirmative, the earlier corpus question 'do we have contemporary press coverage?' -- these are three verified, acquirable contemporary-press items (the corpus holds none acquired yet). Distinct from PB-P005 (Australian Trove residual) and PB-P004 (French legal). POLITENESS LAPSE (disclosed): the OCR was fetched with raw curl (descriptive UA + ~1 req/s spacing, but NOT the shipped polite HttpClient, contra Principle XII), and a missing redirect flag wasted one round of 4 requests before the -L retry; the affair-term analysis then ran offline on the local files. Going forward, route ad-hoc verification fetches through the shipped HttpClient. Verdict rests on the OCR text (a weak-per-token signal at the issue level, but the term density + readable context make the 3 confirmations unambiguous and the 1 rejection clear)."

