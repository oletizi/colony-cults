2). Full-issue OCR means the keyword hit is a WEAK signal; each needs its OCR read to confirm genuine de Rays coverage. Unlike the PB-P005 Trove press residual (unbounded, not exhaustively acquirable), these are DISCRETE IA items -- if genuine, each a clean n=1 acquisition."
