  query: "First Italian-language discovery axis (TASK-38): the ~340 colonists were mostly Venetian/Friulian (Treviso/Pordenone -- Francenigo, Codogne, Orsago, Sacile), recruited by Edvige Schenini, sailed on the India from Barcelona (Jul 1880), founded Piccola Venezia/Cella Venezia -> New Italy NSW. Is there a DISCRETE, digitised, public-domain, CONTEMPORARY (1880s) Italian PRIMARY source acquirable now that the Franco-Anglo-Australian sweep never touched? Ran 5 Italian-term handles through archive.org's keyless Solr advancedsearch.php via a one-off discovery script driving the shipped polite HttpClient (descriptive contactable UA + ~1 req/s + backoff; raw JSON persisted under repository-responses/PB-P055/ia-search-it-*-2026-07-17.json before analysis), plus web reconnaissance of the Italian secondary literature, the Camera dei deputati XIV-Legislatura (1880-82) portal, and the Italian historical-press archives."
  coverage: "MEASURED -- NO new discrete digitally-acquirable public-domain Italian primary source via shipped tooling; the axis grew corpus KNOWLEDGE, not the held corpus. (1) archive.org Italian handles NEGATIVE: 5 handles (incl. a language:Italian filter), each below the 50-row cap so complete -- the only affair item is the already-held de Groote FRENCH book (nouvellefrancec00groogoog, PB-P055); every other hit is noise (CIA reading-room docs + Smashing Pumpkins bootlegs matched on a fuzzy 'Rays'; the 'Nuova Francia' term is polluted by the 16th-c. Verrazzano/Canada 'New France' homonym -- 1769 Elogio di Verrazzano, 1778 Zatta map), and 0 hits for Schenini. So the shipped IA adapter has nothing new to mirror on the Italian axis. (2) The affair IS a well-documented Italian emigration tragedy, but the PRIMARY record is FRENCH: a native Italian researcher (gondorcal.it) states the primary sources are 'perlopiu testi francesi di fine 800' -- i.e. the corpus's existing French holdings ARE the primary record. Modern Italian treatments are secondary + in-copyright (Stanislao Nievo, 'Le isole del paradiso', romanzo, Premio Strega 1987; Avvenire; Allora! News; gondorcal) -- not acquisition targets. (3) Two Italian PRIMARY veins EXIST but are NOT reachable via shipped tooling / general web right now: (a) PARLIAMENTARY/GOVERNMENT records -- the fraud was a national Italian scandal (~300 Veneto/Friuli contadini recruited on Italian soil by the truffatore Schenini; persisted evidence), so a discrete contemporary record (a warning circular / interrogazione) PLAUSIBLY sits in the Camera dei deputati XIV-Legislatura (1880-82) acts, digitised + full-text-searchable at storia.camera.it BUT behind a browser-verification wall (the polite HttpClient re-fetch persisted the 'automatic/challenge/redirect' verification page, not content -- italian-recon-camera-portal-*) -- the same class of obstacle as Trove's Anubis wall (SRCH-0016) and the Gazette-des-Tribunaux drill-in (SRCH-0004): serial home located, specific document not pinpointed by general-web tools (-> TASK-42); NB an earlier draft asserted 'the Italian authorities tried to stop the emigration' -- that detail rode an unpersisted secondary web snippet (avvenire, 404 on polite re-fetch) and is NOT corroborated in the persisted evidence, so it is downgraded to the scandal-scale plausibility above; (b) CONTEMPORARY ITALIAN PRESS (Emeroteca Digitale Braidense/BNCR; Gazzetta di Venezia the natural Venetian home) -- abundant 1880-81 coverage of a national scandal, but largely image-only + cross-masthead, a PRESS RESIDUAL analogous to PB-P005 (Trove) and the French press (PB-P004): unbounded, not exhaustively acquirable, not a discrete target."
