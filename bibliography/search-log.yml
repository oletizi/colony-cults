# Repository search history — authored SSOT for the corpus coverage audit.
#
# Append-only, date-ordered record of repository searches. Nothing else records
# per-search facts (RepositoryRecords are per-copy, not per-search). This file is
# authored by hand; `bib coverage` aggregates it into the repository x scope
# matrix and the repository-axis rollup. It is committed primary data.
#
# CLEAN BREAK (spec 010, FR-004/FR-005): each entry targets a `scope:` --
# a discriminated { kind, id } reference (kind one of case/thread/work-bundle/
# work) resolved fail-loud against the corpus by `resolveScopeRef`
# (src/bibliography/scope.ts). The retired `campaign:` scalar (a bare
# source-group sourceId) is a HARD ERROR if reintroduced -- there is no
# dual-schema, no tolerated alias.
#
# Each entry (append a new one; never rewrite an existing one):
#   - id: SRCH-0001                 # stable flat-opaque id; UNIQUE across the file
#     date: 2026-07-03              # ISO YYYY-MM-DD of the search
#     repository: State Library of Queensland
#     scope:                        # { kind, id } -- see src/bibliography/scope.ts
#       kind: work-bundle           # case | thread | work-bundle | work
#       id: PB-P004                 # resolved under kind (a work-bundle id names a source-group)
#     query: "de Rays trial records, 1880s"   # what was searched: query/collection/coverage scope
#     coverage: "catalogue searched; 2 hits, both already held"
#     remainingQuestions:           # optional
#       - "appeal-court records not online"
#     notes: "optional free-text"   # optional
#
# Validation: entry ids must be unique; each entry must carry
# id/date/repository/scope/query/coverage; and `scope` must resolve under its
# declared kind (surfaced by `bib validate`).

- id: SRCH-0001
  date: 2026-07-11
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Marquis de Rays trial + Port-Breton colony imprints — BnF OAI record resolution for the trial-corpus members"
  coverage: "5 trial/colony imprints resolved to Gallica arks with domaine-public rights and OAI records captured: PB-P007 (jugement-stenography extract, 1889), PB-P008 (Cour de Paris appeal pleading), PB-P009 (subscription-closing notice), PB-P010 (ministerial-circular rebuttal), PB-P011 (published lecture). Responses on disk in bibliography/repository-responses/."
  remainingQuestions:
    - "Cour de Paris appeal-court archival case files not searched beyond the one published pleading (PB-P008)"
    - "Contemporary French press coverage of the trial beyond the colony's own newspaper not yet searched"
  notes: "Discovery mechanism: operator-supplied arks + BnF OAI resolution (spec 009 assumption). Logged retroactively from the dated repository-responses evidence (2026-07-11); not a fresh query."

- id: SRCH-0002
  date: 2026-07-13
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Fresh search on SRCH-0001's two open threads: (1) Cour de Paris / trial court records beyond the one held pleading (PB-P008); (2) contemporary French press of the de Rays trial beyond the colony's own paper. Gallica full-text + BnF catalogue, cross-checked against the legal-history databases Criminocorpus and the Bibliographie numerique d'histoire du droit."
  coverage: "Thread 1 (court records): found one NEW discrete trial-record work -- Vermont, 'Le proces du Marquis de Rays... Les Plaidoiries' (Marseille, 1884, 192 p.), the advocate Me Vermont's pleadings, distinct from PB-P008 -> cataloged as PB-P012 (status: discovered; bibliographic identification only, no digitized copy located on Gallica). The official court DECISIONS (Seine jugement 1884; Cour de Paris appeal arret 14 May 1884; cassation) are attested but live inside the legal serials (Gazette des Tribunaux, Gazette du Palais, Dalloz, Bulletin des arrets Cour de cassation en matiere criminelle -- all on Gallica), not as standalone monographs -> recorded as a suspected gap on PB-P004. Thread 2 (press): contemporary coverage is abundant and politically polarized (Le Figaro, Le Temps, La Presse, et al., all in Gallica's digitized press) -- an effectively IRREDUCIBLE open set, not exhaustively enumerable as discrete corpus members; treated as a documented residual, not left as a bare unexamined unknown."
  remainingQuestions:
    - "PB-P012 (Vermont 'Les Plaidoiries', 1884): identified bibliographically but no digitized/held copy located yet -- locate a holding + confirm per-item rights before promotion to approved-for-acquisition."
    - "Official court decisions (Seine jugement 1884; Cour de Paris arret 14 May 1884; cassation): attested but not yet located as discrete items within the legal serials -- serial-issue inventory (Gazette des Tribunaux / Gazette du Palais / Dalloz / Bulletin des arrets) pending."
    - "Physical Cour de Paris appeal-court case dossier (Archives de Paris / Archives nationales) not searched -- may hold no separately publishable digitized work."
  notes: "Fresh interactive search pass (spec 009 US1). Press dimension characterized as irreducible rather than enumerated -- exhaustive press mirroring is neither feasible nor the corpus's aim. Supersedes SRCH-0001's two coarser open questions with the narrower, actionable questions above."

