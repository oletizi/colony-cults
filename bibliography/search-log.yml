- id: SRCH-0033
  date: 2026-07-21
  repository: Chronicling America / US Library of Congress (loc.gov)
  scope:
    kind: case
    id: port-breton
  query: "First US-press axis (SRCH-0032 next-axis / the other half of TASK-39). Registered a provisional chronicling-america SourceConfig and ran 'Marquis de Rays' through the shipped governed bib query-source client (spec 014)."
  coverage: "BLOCKED -- vein UNMEASURED, but two concrete findings. (1) MIGRATION: the legacy chroniclingamerica.loc.gov/search/pages/results/ endpoint is RETIRED. The first governed navigation returned a persisted capture titled 'Page Not Found -- 404 -- Library of Congress' (the loc.gov global-search shell). Confirmed via loc.gov's own migration docs (WebSearch used ONLY to locate the current endpoint URL, no content cited): since the 2025-08 upgrade the Chronicling America collection is accessible EXCLUSIVELY via the unified loc.gov site/API. Repointed the config at https://www.loc.gov/collections/chronicling-america/?q=. (2) CLOUDFLARE BLOCK: loc.gov now sits behind a Cloudflare MANAGED challenge (cType:'managed', challenges.cloudflare.com, 'Just a moment...' interstitial). The collection endpoint returns HTTP 403 with the SOLVABLE challenge page (it carries the /cdn-cgi/challenge-platform orchestrate script -- not a terminal block). The governed client HARD-BLOCKS on the 403 and cannot clear it. Profile-clear did NOT help -- this is NOT a stale-cookie re-challenge (TASK-44 remediation N/A). No result count obtained."
  remainingQuestions:
    - "CLIENT CAPABILITY GAP (root cause): the governed client cannot clear a Cloudflare managed challenge. browser-session-playwright.ts navigate() does page.goto(url, {waitUntil:'domcontentloaded'}) and reads response.status() immediately -- domcontentloaded fires on the 403 challenge HTML BEFORE the challenge JS self-solves and reloads to the real 200 page, so the client only ever sees the 403. Fix: add a challenge-detect + wait-for-resolution step (detect the cf challenge-platform fingerprint, wait for the auto-solve reload to a non-challenge 200, then re-read/persist/classify). Durable -- unblocks ANY Cloudflare-fronted source, not just loc.gov. Principle-XII-critical client code -> warrants its own spec/plan."
    - "An operator-set US exit node ALONE is unlikely to unblock: the managed challenge is JS-based (not purely IP), and datacenter/VPN IPs are MORE Cloudflare-challenged, not less. The client-side challenge-wait is the necessary fix regardless of IP."
    - "Alternative axes if the client fix is deprioritized: Trove (Australian press -- richest, but retention-ToS forbids raw persistence) or the New Italy NSW settlement topic (backlog TASK-34)."
  notes: "Recon produced value despite the block: discovered the loc.gov migration (legacy Chronicling America endpoint dead) AND a real governed-client gap (no Cloudflare managed-challenge clearing). Persist-first prevented a false negative on the 404. Governed client only; WebSearch used solely to locate the current endpoint URL. Provisional chronicling-america SourceConfig committed on branch feature/chronicling-america-recon. Captures under bibliography/repository-responses/chronicling-america/: the 404 (legacy endpoint) + two Cloudflare-403 interstitials (loc.gov collection endpoint)."
