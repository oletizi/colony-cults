    - "Italian contemporary PRESS (Emeroteca Digitale Braidense/BNCR) is a PRESS RESIDUAL -- classify with PB-P005 (Trove) and the French press: irreducible, not a discrete acquirable work. A real-browser MEASUREMENT (counts, per SRCH-0016) could substantiate the residual if the corpus wants it, but no adapter is warranted."
    - "'Nuova Antologia' (major Italian review, 1866+, digitised on archive.org) MAY carry a contemporary de Rays article -- a container-drilling task (like the French legal serials), not a title-level hit. Low priority; not chased this pass."
  notes: "First Italian-language axis, captured durably as TASK-38 before running (the axis existed only in session dialogue). OUTCOME mirrors the research-first / just-in-time thesis: 'is there untapped Italian PRIMARY material acquirable now?' is answered MEASURED-NO on archive.org, with the two live veins (wall-gated parliamentary records -> TASK-42; press residual) documented rather than left as bare unknowns. The Italian dimension is REAL and central (the victims were Italian) but the acquirable primary record is FRENCH (already the corpus's strength) + an English aftermath (PB-P056, Clifford) + Anglo/Asian press (PB-P005 / P057-059). Method: keyless advancedsearch.php via the shipped HttpClient with a descriptive contactable UA; raw JSON committed before parsing. No new source cataloged. POLITENESS LAPSE (disclosed + remediated, contra Principle XII): the archive.org Solr calls went correctly through the shipped polite HttpClient with persistence, but the WEB RECONNAISSANCE (the Camera-portal repository probe + the secondary-source reads the coverage cites) was first made with the ad-hoc WebFetch tool, which bypasses the politeness envelope and persists nothing. REMEDIATION: re-fetched each reconnaissance URL through the shipped HttpClient (descriptive contactable UA + ~1 req/s + backoff) and persisted the raw responses (italian-recon-*-2026-07-17.html + italian-recon-MANIFEST-2026-07-17.json). The persisted evidence CONFIRMS the cited claims (gondorcal: 'perlopiu testi francesi di fine 800'; wikipedia: Nievo, Premio Strega 1987; Camera probe: the verification wall) and REFUTED one (the 'authorities tried to stop' detail, unpersisted avvenire snippet, downgraded above). Going forward (TASK-39/40/41): route ALL source/reconnaissance fetches through the shipped HttpClient, never ad-hoc WebFetch/curl."

