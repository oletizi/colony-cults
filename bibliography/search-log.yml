  remainingQuestions:
    - "ACQUISITION target confirmed; shipped path now exists (RESOLVED 2026-07-16): the de Groote 1880 book (nouvellefrancec00groogoog) is public-domain + digitised on the Internet Archive. The archive.org acquisition adapter shipped as spec 013 (the third first-class RepositoryAdapter, ia-item copies), live-verified end-to-end against this very item (resolve + PDF download + fidelity median ratio 1.0 -> explode-PDF + lossless PNG page-masters). The book is now cataloged AND ACQUIRED as PB-P055 (2026-07-16/17): 419 lossless PNG page-masters (leaves 3-421; Google preamble leaves 1-2 excluded from the masters per operator review, retained in the preserved source PDF) + the source PDF mirrored to B2, reconcile verified 420/420 masters in the object store, RepositoryRecord -> archived with a durable qualityAssessment (sound, approved range 3-421). Fidelity measured 1.0 on the real item (PDF images == recorded scan dims) so the frugal explode-PDF path was used. A genuine corpus-growth win: the central de Groote imprint, unreachable via Gallica, now held via the new archive.org adapter."
