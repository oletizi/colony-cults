  coverage: "MEASURED -- 8 query handles, each returning below the 50-row cap (so complete for these handles): 'Marquis de Rays' (numFound 2), 'Port Breton'/'Port-Breton' (7), 'Nouvelle France' AND (Oceanie/Port-Breton/Rays) (4), 'New Ireland' AND (Rays/Port-Breton/colony) (7), 'New Italy' AND (Rays/settlers/Richmond River/Italian) (8), Chevert AND (Rays/...) (0), 'Phantom Paradise' OR ('de Rays' AND expedition) (4), creator:(de Groote/Baudouin/Niau/Raphalen) AND (Rays/...) (1). 26 dedup'd items; most are generic-term noise (a New-Italy wine guide, Mussolini's 'New Italy', 'Phantom of the Paradise' the film, CIA reading-room docs, a New Guinea ethnography). ONE GENUINE NEW FIND, verified acquirable: richmondriverdis00clif -- F. C. Clifford, 'Richmond River district of New South Wales. New Italy: a brief sketch of a new and thriving colony, founded and established by the Italian immigrants who were sufferers by the Marquis de Ray's New Ireland colonization scheme' (Sydney: C. Potter, government printer, 1889). Metadata verified (persisted as ia-metadata-richmondriverdis00clif-2026-07-17.json): mediatype texts, 1889 NSW government-printer imprint (public-domain by publication age; IA possible-copyright-status empty, unlike de Groote's explicit NOT_IN_COPYRIGHT, so rights ride on the age basis), source PDF + _jp2.zip page-image set present -> acquirable via the shipped Internet Archive adapter (spec 013) with zero new tooling. A first-hand contemporary description of the New Italy survivors' colony, 8 years post-disaster -- squarely the aftermath axis. SANITY CHECK: the sweep re-found nouvellefrancec00groogoog (de Groote 1880), already held as PB-P055 -- expected. FOUR PRESS CANDIDATES (verification-pending): discrete IA-hosted full-issue newspaper OCR scans surfaced on the affair/New-Ireland handles -- China Mail 1880-10-16 (NPCM18801016), China Mail 1882-03-08 (NPCM18820308), Hong Kong Daily Press 1883-07-16 (NPDP18830716), Hong Kong Telegraph 1894-01-02 (NPTG18940102). Full-issue OCR means the keyword hit is a WEAK signal; each needs its OCR read to confirm genuine de Rays coverage. Unlike the PB-P005 Trove press residual (unbounded, not exhaustively acquirable), these are DISCRETE IA items -- if genuine, each a clean n=1 acquisition."
  remainingQuestions:
