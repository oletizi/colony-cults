# Repository search history — authored SSOT for the corpus coverage audit.
#
# Append-only, date-ordered record of repository searches. Nothing else records
# per-search facts (RepositoryRecords are per-copy, not per-search). This file is
# authored by hand; `bib coverage` aggregates it into the repository x scope
# matrix and the repository-axis rollup. It is committed primary data.
#
# CLEAN BREAK (spec 010, FR-004/FR-005): each entry targets a `scope:` --
# a discriminated { kind, id } reference (kind one of case/thread/work-bundle/
# work) resolved fail-loud against the corpus by `resolveScopeRef`
# (src/bibliography/scope.ts). The retired `campaign:` scalar (a bare
# source-group sourceId) is a HARD ERROR if reintroduced -- there is no
# dual-schema, no tolerated alias.
#
# Each entry (append a new one; never rewrite an existing one):
#   - id: SRCH-0001                 # stable flat-opaque id; UNIQUE across the file
#     date: 2026-07-03              # ISO YYYY-MM-DD of the search
#     repository: State Library of Queensland
#     scope:                        # { kind, id } -- see src/bibliography/scope.ts
#       kind: work-bundle           # case | thread | work-bundle | work
#       id: PB-P004                 # resolved under kind (a work-bundle id names a source-group)
#     query: "de Rays trial records, 1880s"   # what was searched: query/collection/coverage scope
#     coverage: "catalogue searched; 2 hits, both already held"
#     remainingQuestions:           # optional
#       - "appeal-court records not online"
#     notes: "optional free-text"   # optional
#
# Validation: entry ids must be unique; each entry must carry
# id/date/repository/scope/query/coverage; and `scope` must resolve under its
# declared kind (surfaced by `bib validate`).

- id: SRCH-0001
  date: 2026-07-11
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Marquis de Rays trial + Port-Breton colony imprints — BnF OAI record resolution for the trial-corpus members"
  coverage: "5 trial/colony imprints resolved to Gallica arks with domaine-public rights and OAI records captured: PB-P007 (jugement-stenography extract, 1889), PB-P008 (Cour de Paris appeal pleading), PB-P009 (subscription-closing notice), PB-P010 (ministerial-circular rebuttal), PB-P011 (published lecture). Responses on disk in bibliography/repository-responses/."
  remainingQuestions:
    - "Cour de Paris appeal-court archival case files not searched beyond the one published pleading (PB-P008)"
    - "Contemporary French press coverage of the trial beyond the colony's own newspaper not yet searched"
  notes: "Discovery mechanism: operator-supplied arks + BnF OAI resolution (spec 009 assumption). Logged retroactively from the dated repository-responses evidence (2026-07-11); not a fresh query."

- id: SRCH-0002
  date: 2026-07-13
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Fresh search on SRCH-0001's two open threads: (1) Cour de Paris / trial court records beyond the one held pleading (PB-P008); (2) contemporary French press of the de Rays trial beyond the colony's own paper. Gallica full-text + BnF catalogue, cross-checked against the legal-history databases Criminocorpus and the Bibliographie numerique d'histoire du droit."
  coverage: "Thread 1 (court records): found one NEW discrete trial-record work -- Vermont, 'Le proces du Marquis de Rays... Les Plaidoiries' (Marseille, 1884, 192 p.), the advocate Me Vermont's pleadings, distinct from PB-P008 -> cataloged as PB-P012 (status: discovered; bibliographic identification only, no digitized copy located on Gallica). The official court DECISIONS (Seine jugement 1884; Cour de Paris appeal arret 14 May 1884; cassation) are attested but live inside the legal serials (Gazette des Tribunaux, Gazette du Palais, Dalloz, Bulletin des arrets Cour de cassation en matiere criminelle -- all on Gallica), not as standalone monographs -> recorded as a suspected gap on PB-P004. Thread 2 (press): contemporary coverage is abundant and politically polarized (Le Figaro, Le Temps, La Presse, et al., all in Gallica's digitized press) -- an effectively IRREDUCIBLE open set, not exhaustively enumerable as discrete corpus members; treated as a documented residual, not left as a bare unexamined unknown."
  remainingQuestions:
    - "PB-P012 (Vermont 'Les Plaidoiries', 1884): identified bibliographically but no digitized/held copy located yet -- locate a holding + confirm per-item rights before promotion to approved-for-acquisition."
    - "Official court decisions (Seine jugement 1884; Cour de Paris arret 14 May 1884; cassation): attested but not yet located as discrete items within the legal serials -- serial-issue inventory (Gazette des Tribunaux / Gazette du Palais / Dalloz / Bulletin des arrets) pending."
    - "Physical Cour de Paris appeal-court case dossier (Archives de Paris / Archives nationales) not searched -- may hold no separately publishable digitized work."
  notes: "Fresh interactive search pass (spec 009 US1). Press dimension characterized as irreducible rather than enumerated -- exhaustive press mirroring is neither feasible nor the corpus's aim. Supersedes SRCH-0001's two coarser open questions with the narrower, actionable questions above."

- id: SRCH-0003
  date: 2026-07-13
  repository: "Multi-catalog holding search (Gallica, archive.org, HathiTrust, Google Books; union catalogs WorldCat / CCFr)"
  scope:
    kind: work
    id: PB-P012
  query: "Locate a digitized, acquirable public-domain copy of PB-P012 (Vermont, 'Le proces du Marquis de Rays... Les Plaidoiries', Marseille, 1884)."
  coverage: "NEGATIVE: no digitized copy found in any surveyed repository -- absent from Gallica, archive.org, HathiTrust, and Google Books. The work is attested only bibliographically (Criminocorpus; Bibliographie numerique d'histoire du droit) and appears to survive as a physical-only library holding. Not acquirable as a digital public-domain master at this time; PB-P012 stays 'discovered' (known, not held)."
  remainingQuestions:
    - "Physical holding location for the 1884 Marseille imprint not yet confirmed via WorldCat / CCFr; and no digitization exists to mirror -- acquisition blocked on availability, not on rights."
  notes: "Work-scoped holding search following the SRCH-0002 discovery. Negative result recorded as measured knowledge: a known trial-record work with no currently-locatable digital copy -- an irreducible-for-now holding gap, not an unexamined unknown."

- id: SRCH-0004
  date: 2026-07-13
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Inventory the official court decisions (SRCH-0002 suspected gap): locate the Cour de Paris appeal arret (14 May 1884) and the tribunal de la Seine jugement (1884) in the digitized legal serials (Gazette des Tribunaux, Gazette du Palais, Dalloz/Sirey)."
  coverage: "PARTIAL: the Gazette des Tribunaux (Paris) is confirmed digitized on Gallica (ark cb34447990d) as a date-browsable serial run -- so the appeal arret, dated 14 May 1884, should appear in the ~15-16 May 1884 issue. WebSearch/WebFetch cannot drill into Gallica's periodical date-browse (403 on the OAI/IIIF endpoints); pinpointing the exact issue + folios is a shipped-gallica-fetcher / IIIF task, not a general-web one. So the serial HOME is located; the specific issue is not yet pinpointed. (The PB-P012 holding question raised in SRCH-0002 has migrated to its own work-scope search, SRCH-0003.)"
  remainingQuestions:
    - "Pinpoint the Cour de Paris arret (14 May 1884) + the Seine jugement (1884) within the Gazette des Tribunaux run on Gallica (ark cb34447990d) -- date-browse via the shipped fetcher/IIIF; confirm 1884 falls within the digitized range."
    - "Physical Cour de Paris appeal-court case dossier (Archives de Paris / Archives nationales) not searched -- may hold no separately publishable digitized work."
  notes: "Narrows SRCH-0002's court-decisions question from 'attested but unlocated' to 'serial home confirmed digitized on Gallica; specific issue pinpointing pending (fetcher/IIIF)'. Supersedes the SRCH-0002 work-bundle open set; the PB-P012 holding line is now tracked under work PB-P012 (SRCH-0003), not duplicated here."

- id: SRCH-0005
  date: 2026-07-13
  repository: "Gallica / BnF + digital libraries (archive.org, HathiTrust, Google Books) + the local archive repo"
  scope:
    kind: work
    id: PB-P002
  query: "Resolve PB-P002's open 'digitization/acquirability not yet confirmed' question: is P. de Groote's 'Nouvelle-France: Colonie libre de Port-Breton, Oceanie' digitized/acquirable, beyond the BnF CATALOGUE ark cb34944911d?"
  coverage: "RESOLVED -> already acquired. Gallica search surfaced the digitized DOCUMENT ark bpt6k58039518 ('Colonie libre de Port-Breton : Nouvelle France en Oceanie / [signe: Ch. du Breil, marquis de Rays]' -- the same de Groote work, catalogued by Gallica under the colony's promoter). Auditing the private archive repo against the SSOT (operator prompt) then showed PB-P002 is ALREADY ACQUIRED: 32 page-images (domaine public) under that ark, masters in B2. The SSOT had been left STALE at status: to-collect with only the catalogue ark. Ran `bib reconcile PB-P002` -> archived (32/32 masters in object store); corrected the record to carry the document ark bpt6k58039518 + a truthful note. De Groote's work is NOT absent from open repositories (contra a first read) -- it is on Gallica and held. Corpus-wide audit: PB-P002 was the only to-collect-but-acquired staleness; PB-P001 (Gallica archived; SLQ copy legitimately to-collect) and PB-P005 (Trove, 0 in archive) are correct."
  remainingQuestions:
    - "PB-P002 date discrepancy: this record says 1879; BnF/Gallica date the imprint 1880 -- reconcile the year."
  notes: "Found by the operator's 'check the archive repo for what we've already acquired' prompt. The lesson: reconcile the SSOT against the archive's committed provenance, not just against external catalogues -- an acquired work can sit stale as to-collect."

- id: SRCH-0006
  date: 2026-07-13
  repository: Gallica / BnF
  scope:
    kind: work
    id: PB-P001
  query: "Issue-completeness audit of the periodical PB-P001 (La Nouvelle France journal): are all Gallica-digitized issues acquired, and which months of the run are missing?"
  coverage: "COMPLETE against Gallica. The census (data/census/PB-P001-la-nouvelle-france.json, from periodical ark cb328261098/date, built 2026-07-08) enumerates 78 digitized issues spanning 1879-07-15..1885-10-15, and ALL 78 are acquired (985 page-images, masters in B2) -> acquirable extent CLOSED, gap 0. Month-gap analysis of the acquired set: 68 of the 76 months in the span carry an issue; 8 months (1880-07, 1880-09, 1880-11, 1880-12, 1881-02, 1881-03, 1881-05, 1881-06 -- all in the 1880-81 crisis) have none. Those 8 months are ABSENT from Gallica's census too, so they are NOT an acquisition gap -- they are beyond Gallica's digitization."
  remainingQuestions:
    - "Classify the 8 crisis-month gaps (1880-81) as never-published vs BnF-physical-only (published but undigitized) -- needs the BnF PHYSICAL catalogue / a non-Gallica holdings check. An irreducible residual with respect to Gallica."
  notes: "Second pass of the operator's archive-vs-SSOT audit. PB-P001's Gallica-acquirable extent is MEASURED complete (78/78, census-confirmed), not asserted; the residual is documented. Corrected PB-P001's stale year range (1879-1882 -> 1879-1885) while here."

- id: SRCH-0007
  date: 2026-07-13
  repository: Trove / National Library of Australia
  scope:
    kind: work
    id: PB-P005
  query: "First non-Gallica search-and-log: what Australian newspaper coverage of the de Rays / Port-Breton / New Italy affair does Trove hold, and does acquiring it warrant building the Trove adapter the plan anticipated (T015)?"
  coverage: "Trove holds ABUNDANT digitized, public-domain Australian reportage across many papers (SMH, Sydney Mail, The Tasmanian, et al.), 1880-1883+. Landmark exemplars located: 898535 (1 Jun 1880 'The New Colony at New Ireland'), 13481147 (25 Mar 1881 'Emigrants for Sydney'), 161883566 (16 Apr 1881 'The Marquis de Rays' Victims'), 199526344 (25 Jun 1881 'The New Ireland Fiasco'), 3420684 (3 Aug 1883 'The Marquis de Rays' Expedition'). FINDING: this is a topical PRESS RESIDUAL -- unbounded and not exhaustively acquirable, analogous to the French-press residual on PB-P004 -- NOT a discrete acquirable work. Research-first outcome: NO Trove adapter warranted (T015 disproven, not deferred) -- there is no repetitive discrete-acquisition target; any handful of exemplars is a manual n=1 fetch, not a seam. This is the just-in-time-tooling thesis working: the adapter was never pre-built, and the research shows it should not be."
  remainingQuestions:
    - "Operator curation: does the corpus want a few discrete Trove exemplars (e.g. the survivors'-arrival report) as evidentiary anchors? If so, acquire them manually (n=1) -- still no adapter."
  notes: "PB-P005's model (kind: periodical, status: to-collect) reads as a single collectible run but is really a cross-paper topical slice; reframed in the source notes as an irreducible residual. The discrete Australian PRIMARY holdings live in PB-P006 (New Italy Museum photos + settler writings), not in Trove newspapers."

- id: SRCH-0008
  date: 2026-07-15
  repository: BnF Catalogue général (SRU + notices)
  scope:
    kind: work
    id: PB-P002
  query: "Reconcile the PB-P002 imprint-year discrepancy (record says 1879; a prior note claimed BnF dates it 1880) against the authoritative BnF catalogue -- is the held item the 1879 or the 1880 work? (Gallica itself was unreachable this session -- gallica.bnf.fr resets connections from this environment; catalogue.bnf.fr / the SRU API are reachable and were used instead.)"
  coverage: "RESOLVED -> the discrepancy was a WORK-IDENTITY CONFLATION, not a date error, and the original 1879 was correct. The held digitised copy (Gallica ark bpt6k58039518, 32 page-images) is authoritatively BnF notice cb34139872z: 'Colonie libre de Port-Breton : Nouvelle France en Océanie', by Charles Du Breil de Rays (1832-1893), Marseille: Marius Olive, 1879, 20 p. in-8 -- and that notice links directly to Gallica bpt6k58039518. A prior reconciliation had mis-linked PB-P002 to notice cb34944911d and mis-attributed it to P. de Groote; but cb34944911d is a SEPARATE work -- de Groote's 368-p. 'Nouvelle-France... œuvre de colonisation agricole' (Paris, Société générale de librairie catholique, 1880), decisively distinct on page count alone (368 p. vs a 20-p. prospectus). Corrected PB-P002: creator de Groote -> Du Breil de Rays; catalogue ark cb34944911d -> cb34139872z; rights basis re-derived (de Rays d.1893 -> PD 1964); canonical title set to the BnF form (old title kept as an alternate). The SRU sweep for 'Colonie libre de Port-Breton' also surfaced a cluster of Port-Breton affair imprints NOT yet in the corpus (captured as discovery leads below; none acquired -- acquisition needs Gallica, currently blocked)."
  remainingQuestions:
    - "Discovery lead (not held): cb34944911d -- P. de Groote, 'Nouvelle-France, colonie libre de Port-Breton, Océanie: œuvre de colonisation agricole', Paris, 1880, 368 p. A major promotional book; central. Digitisation + rights check pending (needs Gallica)."
    - "Discovery lead (not held): cb30067131v -- Dr A. Baudouin, 'L'aventure de Port-Breton : et la colonie libre dite Nouvelle-France', Paris, M. Dreyfous, 1883, 346 p. A contemporary CRITICAL account of the affair; central secondary source. Digitisation + rights check pending."
    - "Discovery lead (not held): cb34139874n -- 'Colonie libre de Port-Breton (Nouvelle France-Océanie), Bureau de Paris', Paris, Schiller, 1881; and cb33311782v -- 'La Colonie libre de Port-Breton. Nouvelle-France (Océanie). Exposé sommaire', Marseille, Blanc et Bernard, 1881. The colony's own promotional literature (de Rays-side); central primary. Digitisation + rights check pending."
    - "Discovery lead (not held): cb302225480 -- G. Charbonnier, 'Exploitation de la canne à sucre dans la colonie libre du Port-Breton', Paris, 1879, 7 p. (promotional/technical); and cb38797788d -- Maur d'Auxais, 'Carte de la Nouvelle France. Colonie libre de Port Breton', 1881 (the colony MAP). Central primary. Digitisation + rights check pending."
  notes: "Second use of the just-in-time research posture, this time against the BnF catalogue SRU because Gallica was blocked. The de Rays / de Groote conflation shows why page count is the decisive work-identity discriminator when two works share a near-identical title. The discovery cluster excludes arks already held: cb341398750 (PB-P009), cb34139871m (PB-P010), cb328261098 (PB-P001, the colony's serial). These leads are the concrete Gallica acquire targets for when access returns -- 'the central corpus grows in the affair itself'."

- id: SRCH-0009
  date: 2026-07-15
  repository: WorldCat + CCFr + BnF Catalogue général
  scope:
    kind: work
    id: PB-P012
  query: "Widen the SRCH-0003 holding search for PB-P012 (Henri Vermont, 'Le procès du Marquis de Rays... Les Plaidoiries', Marseille, impr. Blanc et Bernard, 1884, 192 p.) beyond Gallica/archive.org/HathiTrust/Google Books to the union catalogues -- WorldCat, CCFr (Catalogue collectif de France), and the BnF Catalogue général -- to locate a PHYSICAL holding + cote."
  coverage: "NEGATIVE (measured). The Criminocorpus record (ouvrages/118666) that first attested the work confirms the imprint (Marseille, impr. Blanc et Bernard, 1884, 192 p.; cover 'Affaire de Port-Breton... Plaidoirie de Me Vermont') but names NO holding library or cote. WorldCat, CCFr, and the BnF Catalogue général surface no record for this specific Vermont plaidoiries imprint (only the unrelated de Rays literature -- Baudouin, the 'Phantom Paradise' translations, de Groote, etc.). No digitised copy and no locatable physical holding via the major union catalogues -- an irreducible-for-now holding gap, confirming SRCH-0003's finding at a wider search radius. Stays 'discovered'; not digitally acquirable."
  remainingQuestions:
    - "Physical holding for the 1884 Marseille Blanc-et-Bernard imprint still unlocated after WorldCat/CCFr/BnF-catalogue. Next radius would be Marseille-local catalogues (BM Marseille / Alcazar) or a specialist legal-history library -- out-of-band, no acquisition path."
  notes: "Supersedes SRCH-0003's Gallica/digital-library holding search with the union-catalogue radius the earlier note flagged as pending. Result is the same measured negative, now with WorldCat + CCFr explicitly checked: a known trial-record work with no currently-locatable copy, digital or physical -- an irreducible holding gap, not an unexamined unknown."
