- id: SRCH-0010
  date: 2026-07-15
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Pinpoint the de Rays court DECISIONS (SRCH-0004 open question) in the digitised legal serials -- Gazette des Tribunaux (cb34447990d), Gazette du Palais, and the Bulletin des arrêts de la Cour de cassation en matière criminelle -- via Gallica's Issues year-index + ContentSearch, now that Gallica access was restored (new network exit node)."
  coverage: "LOCATED the Cour de cassation decision. (1) Gazette des Tribunaux (cb34447990d): its Gallica digitisation SKIPS 1878-1892 (years jump 1877 -> 1893), so the whole 1884-85 trial window is absent -- confirming SRCH-0004's open 'is 1884 in range' as NO; the daily is a dead end for the decisions. (2) Gazette du Palais: earliest run 1886 (cb343631340 / cb343679674) -- postdates the 14 May 1884 arrêt; ruled out. (3) Bulletin des arrêts de la Cour de cassation en matière criminelle (cb34508686x, run 1804-1913 date-browsable): 1884 AND 1885 digitised. A ContentSearch of the eleven 1884 fascicules located the arrêt de REJET of de Rays's pourvoi in volume bpt6k61587296, p. 48-50: 'REJET des pourvois de : 1° Charles-Bonaventure-Marie Dubreil de Rays [...] contre un Arrêt rendu, le 14 mai 1884, par la Cour d'appel de Paris, chambre correctionnelle, qui les a condamnés, savoir : Dubreil de Rays à quatre ans de prison [...] et solidairement à 3,000 francs d'amende [...] violation par fausse application de l'article 405 du Code pénal [escroquerie]'. This is the Cour de cassation confirming the conviction -- the legal capstone of the affair, digitised + public-domain (1884 official French court publication), reachable for acquisition."
  remainingQuestions:
    - "Acquire the de Rays cassation arrêt de rejet (Bulletin des arrêts criminels 1884, Gallica bpt6k61587296, p. 48-50) as a new PB-P004 member -- an EXCERPT within a large serial volume, not a whole document; needs a page-range acquisition approach (the shipped fetcher fetches whole issues/documents)."
    - "The standalone TEXTS of the Seine jugement (1884) and the Cour de Paris appeal arrêt (14 May 1884) are not separately digitised (they would sit in the un-digitised Gazette des Tribunaux 1884); the cassation arrêt incorporates and confirms both, so it is the reachable proxy. Their separate acquisition stays out-of-band."
    - "Physical Cour de Paris appeal-court case dossier (Archives de Paris / Archives nationales) not searched -- may hold no separately publishable digitised work. (carried forward from SRCH-0004)"
  notes: "Supersedes SRCH-0004's Gazette-des-Tribunaux pinpoint question: the daily has no 1884, but the decision was found in the criminal-cassation Bulletin instead. The exact cassation date is printed at the head of the arrêt (p. 48) -- to be confirmed on acquisition. Method: Gallica Issues year-index (bounded, per-year) + ContentSearch (page-level, no image download) -- deliberately NOT buildCensus (which would paginate the whole run). Gallica access this session was intermittent then restored via a new exit node."

- id: SRCH-0011
  date: 2026-07-16
  repository: Gallica / BnF
  scope:
    kind: work-bundle
    id: PB-P004
  query: "Acquire the located de Rays cassation arrêt (the SRCH-0010 open question): mirror ONLY the pertinent folios (p. 48-50) of the Bulletin des arrêts criminels 1884 fascicule (Gallica bpt6k61587296) as a discrete PB-P004 member, without fetching the whole serial volume of unrelated arrêts."
  coverage: "ACQUIRED. The excerpt-acquisition need SRCH-0010 surfaced (a decision that lives as a 3-page excerpt inside a large fascicule with no standalone ark, which the whole-document fetcher could not target) pulled its tool through the front door: spec 012 (page-range acquisition) added a `fetch-source --pages` path that constrains the fetch loop to declared folios. The arrêt was inventoried as member PB-P054 (Source lifecycle terminal at approved-for-acquisition) and LIVE-acquired -- only folios 48-50 fetched and mirrored to B2 (not the whole fascicule), then reconciled -> repositoryRecord status `archived`, 3/3 folio masters backed + folio-verified. The legal capstone of the affair -- the Cour de cassation decision confirming the conviction (rejet du pourvoi contre l'arrêt de la Cour de Paris du 14 mai 1884, art. 405 C. pén.) -- is now a held, public-domain corpus member."
  remainingQuestions:
    - "The standalone TEXTS of the Seine jugement (1884) and the Cour de Paris appeal arrêt (14 May 1884) remain out-of-band: not separately digitised (they would sit in the un-digitised Gazette des Tribunaux 1884, whose Gallica run skips 1878-1892). The acquired cassation arrêt incorporates and confirms both, so it stands as the reachable proxy; their separate acquisition is not pipeline-reachable. (carried forward from SRCH-0010)"
    - "Physical Cour de Paris appeal-court case dossier (Archives de Paris / Archives nationales) not searched -- may hold no separately publishable digitised work. (carried forward from SRCH-0004/SRCH-0010)"
  notes: "Supersedes SRCH-0010's 'acquire the arrêt' open question with the completed acquisition. First live use of the spec-012 page-range path on a real serial-excerpt member -- the fullest example so far of the just-in-time-tooling thesis: SRCH-0010 proved the concrete need, the tool was specced + built through the front door (define -> execute), and this pass consumed it. The two carried-forward residuals are documented out-of-band dead ends, not unexamined unknowns."

- id: SRCH-0012
  date: 2026-07-16
  repository: Gallica / BnF
  scope:
    kind: work
    id: PB-P002
  query: "Resolve the SRCH-0008 discovery leads' Gallica digitisation + rights: the five not-held Port-Breton affair imprints surfaced under PB-P002's BnF-catalogue sweep -- de Groote's 1880 368p book (cb34944911d), the colony promotional imprints (cb34139874n Schiller 1881; cb33311782v Exposé sommaire, Marseille 1881), Charbonnier's canne-à-sucre pamphlet (cb302225480, 1879), and the Auxais colony MAP (cb38797788d, 1881). Are they digitised on Gallica and public-domain (i.e. pipeline-acquirable), now that a Gallica-reachable exit node is available?"
  coverage: "MEASURED -- 0 of 5 acquirable via the Gallica pipeline. Gallica SRU (dc.title) + OAIRecord, fetched through the shipped polite HttpClient from a Paris exit node; all raw responses persisted under bibliography/repository-responses/PB-P002 (see gap-closure-2026-07-16-MANIFEST.md) and analysed offline. FINDINGS: (1) de Groote 1880 book cb34944911d -- NO Gallica digitisation (0 records on two independent title queries incl. 'colonisation agricole'); the 6-record title sweep returned only already-held works. (2) cb34139874n (Schiller 1881), (3) cb33311782v (Exposé sommaire 1881), (4) cb302225480 (Charbonnier 1879) -- each 0 records: no Gallica digitisation. (5) MAP cb38797788d IS digitised -> btv1b10870266z (Auxais, 1881; dc:relation self-links the cb38797788d notice), BUT rights are 'conditions spécifiques d'utilisation - Société de Géographie' / 'restricted use' and streamable=false -- known-but-restricted per FR-007, refused for mirroring, retained as known. SIDE-WIN: the sweep resolved PB-P003's previously-missing Gallica document ark -> bpt6k58017546 (Baudouin 1883, domaine public, 395 vues = PB-P003's 395 archived masters exactly). Single-work-once verified: all title-sweep hits (bpt6k58039518 PB-P002, bpt6k5606860b PB-P001, bpt6k5806269g PB-P009, bpt6k58040250 PB-P011, bpt6k58017546 PB-P003) are already-held works."
  remainingQuestions:
    - "The de Groote 1880 book (cb34944911d) is now VERIFIED real + digitised + public-domain on the Internet Archive (SRCH-0013, nouvellefrancec00groogoog) -- a genuine acquisition target, just not via Gallica. The other three undigitised-on-Gallica imprints (Schiller 1881 cb34139874n; Exposé sommaire 1881 cb33311782v; Charbonnier 1879 cb302225480) remain BnF-catalogue-notice-only, unverified on non-Gallica catalogues -- pursue on archive.org / Google Books / HathiTrust as forward-discovery leads."
    - "The Auxais 1881 colony map (btv1b10870266z / cb38797788d) is digitised but Société-de-Géographie restricted-use and not streamable -- known-but-restricted, not mirrorable. Re-examine only if BnF rights terms change or a public-domain reproduction surfaces elsewhere."
