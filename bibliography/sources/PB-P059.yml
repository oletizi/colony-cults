titles:
  - text: The Hong Kong Daily Press, 16 July 1883 — "Trial of the Marquis de Rays" (Paris, 12 June cable)
    role: canonical
notes: "A contemporary Asian-English-press report of the de Rays trial and the full scheme's toll: \"The trial began to-day of the Marquis De Rays and seventeen others, charged with manslaughter, fraud and infringement of the... emigration laws\"; 5,000,000 francs subscribed, \"the Marquis pocketed 2,000,000\"; 700,000 hectares sold though the island held only 7,000; \"four old sailing ships... the majority of whom perished\"; \"thirty emigrants died during the passage, 250 more died from hunger and disease after reaching Port Breton and five others were captured and eaten by natives... Only 100 of the unfortunate people succeeded in reaching a friendly country.\" A press complement to the French legal record (PB-P004 / PB-P054) and part of the third contemporary-press thread (Asian-English) identified in SRCH-0015. Verified genuine via OCR (SRCH-0015); located to a single self-contained page (page 3 of 4) via a page + jump analysis on the cleaned OCR (the report concludes and is followed by an unrelated West Africa item — no jump; see repository-responses/PB-P055/ia-press-clean-NPDP18830716-2026-07-17.txt). ACQUISITION: only the affair leaf (page 3) is mirrored as a page-master via the spec-013 IA adapter's --approved-range; the full issue is preserved as the source PDF. Captures under repository-responses/PB-P055 (ia-*-NPDP18830716-*)."
