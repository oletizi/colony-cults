  basis: 'The Hong Kong Daily Press (English-language daily), issue of 16 July 1883 — the cabled report "TRIAL OF THE MARQUIS DE RAYS" (Paris, 12 June), a précis of the whole Port-Breton fraud prosecution and its human toll. Public domain: (1) publication age — an 1883 newspaper of anonymous cable reports; any conceivable term is long elapsed, and it is pre-1955 material; (2) United States — published in 1883, before 1929, so public domain in the U.S., where the Internet Archive scan is hosted. The faithful photographic reproduction is not independently re-copyrightable (the *Bridgeman* principle).'
