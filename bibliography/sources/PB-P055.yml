notes: >-
  P. de Groote's 368-p. promotional BOOK for the Port-Breton / Nouvelle-France
  colony (Paris, Société générale de librairie catholique, 1880) — a central
  affair imprint and a long-standing Phase-2 acquisition goal. DISTINCT from
  PB-P002, the marquis de Rays's separate 20-p. 1879 PROSPECTUS held via Gallica
  (the two share mirror-image titles, the root of a long-running conflation; see
  PB-P002 notes). Verified real, digitised, and public-domain on the Internet
  Archive by SRCH-0013 (2026-07-16): item nouvellefrancec00groogoog, a Google
  Books scan from the University of Michigan (imagecount 421 ≈ 368 text pages +
  plates), possible-copyright-status NOT_IN_COPYRIGHT. Not on Gallica (SRCH-0012
  measured negative), so it is reached via the shipped Internet Archive
  acquisition adapter (spec 013) rather than the Gallica fetcher. Raw archive.org
  metadata + search captures persisted under
  bibliography/repository-responses/PB-P002/archiveorg-*-2026-07-16.json (filed
  there because the verification was scoped to the PB-P002 conflation question).
