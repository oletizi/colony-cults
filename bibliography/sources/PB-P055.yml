  basis: "P. de Groote, \"Nouvelle-France : Colonie libre de Port-Breton, Océanie — œuvre de colonisation agricole\", Paris, Société générale de librairie catholique, 1880; ~368 p. Public domain: (1) France, life+70 — a work published in 1880 by an adult author whose death long predates 1955 (the term is long expired; the author's exact death year is not independently established here, but an 1880 imprint places it far outside any live term); (2) United States — published before 1929, so public domain in the U.S., where the Google/University-of-Michigan scan is hosted. The Internet Archive records possible-copyright-status = NOT_IN_COPYRIGHT, which corroborates. The digitised copy is a faithful photographic reproduction of a public-domain work and is not independently re-copyrightable (the *Bridgeman* principle); the Google \"for non-commercial use\" scanner notice is preserved as evidence and does not create a copyright in the underlying public-domain work."
  determinedAt: 2026-07-16
