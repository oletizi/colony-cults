notes: >-
  F. C. Clifford's 1889 descriptive sketch of the NEW ITALY settlement (Richmond
  River district, Northern Rivers, NSW) — the colony founded by the ~200 Italian
  immigrant families who survived the Marquis de Rays / Port-Breton expedition.
  A first-hand CONTEMPORARY account of the survivors' community, 8 years after
  the disaster, published by the NSW Government Printer (Charles Potter). The
  New-Italy-aftermath counterpart to the affair's promotional/legal imprints:
  the first held source describing what became of the survivors, distinct from
  the de Rays promotional matter (PB-P002/P055) and the New Italy Museum's
  physical-only survivor writings (PB-P006). Found + verified via SRCH-0014
  (2026-07-17): Internet Archive item richmondriverdis00clif — mediatype texts,
  source PDF + _jp2.zip page-image set, public-domain by 1889 publication age.
  Not on Gallica; reached via the shipped Internet Archive acquisition adapter
  (spec 013), as with PB-P055. Raw archive.org search + item metadata captures
  persisted under bibliography/repository-responses/PB-P055
  (ia-search-*-2026-07-17.json, ia-metadata-richmondriverdis00clif-2026-07-17.json).
