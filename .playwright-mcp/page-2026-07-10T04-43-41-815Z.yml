          - generic [ref=f1e26]: "Number 2 — 15 August 18 JOURNAL OF THE FREE COLONY OF PORT-BRETON, NEW BRITAIN Hope and Faith — God, Country and Liberty. For all communications: Editorial Office, Subscriptions or Advertisements, apply to the Director of the Journal La Nouvelle-France, 11, Rue de la République, in Marseille. PRICE FOR FRANCE One Year 5 Francs For abroad, postage in addition Advertisements: per line, 50 cents. Notices 1 fr. For Subscriptions to the land bonds, apply to the Director of the office of the Free Colony of Port-Breton; Either at MARSEILLE: 11, Rue de la République. Or at PARIS: 5, Rue de la Ville l'Evêque. Or at LE HAVRE: 46, Rue des Pincettes. Subscriptions are taken year by year and by sending a postal money order of 5 fr. — The journal appears on the 15th of each month. — Every subscription runs from the 15th of July of each year. Current print run of the Journal = 10,000. Politics is excluded from this publication. General emigration agent of the Free Colony of Port-Breton, for Italy and the Tyrol: Mr. Amedeo Preire, 1, via del Papa, Genoa, Italy."
